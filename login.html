<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPOS | Secure Node Entry</title>
    <link rel="stylesheet" href="s1.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #020617; display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.08) 0%, transparent 70%); z-index: -1;"></div>

    <div class="card" style="width: 100%; max-width: 440px; padding: 56px; border-radius: 40px; box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8);">
        <div style="text-align: center; margin-bottom: 48px;">
            <div class="sidebar-logo" style="padding: 0; margin-bottom: 24px; font-size: 40px; display: inline-block;">RAPOS</div>
            <h2 style="font-size: 24px; margin-bottom: 12px;">Welcome Back, Operator</h2>
            <p style="color: var(--slate-400); font-weight: 500;">Secure your neural node session.</p>
        </div>

        <form id="loginForm" style="display: flex; flex-direction: column; gap: 24px;">
            <div>
                <div class="stat-label">Neural Identity</div>
                <input id="email" type="email" class="input-field" placeholder="operator@rapos.ai" required>
            </div>
            <div>
                <div class="stat-label">Security Protocol</div>
                <input id="password" type="password" class="input-field" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 18px; margin-top: 12px;">
                Authenticate Session
            </button>
        </form>

        <div style="margin-top: 40px; text-align: center; font-size: 14px; color: var(--slate-500); font-weight: 600;">
            New Operator? <a href="signup.html" style="color: var(--brand-primary); text-decoration: none; font-weight: 800;">Initialize Node</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerText = 'AUTHENTICATING...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                alert('Authentication Failed: ' + error.message);
                btn.innerText = originalText;
                btn.disabled = false;
            } else {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
