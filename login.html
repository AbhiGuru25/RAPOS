<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RAPOS</title>
    <link rel="stylesheet" href="s1.css">
    <style>
        body {
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Avoid scroll on auth pages */
        }

        /* Abstract Background Elements */
        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: rgba(37, 99, 235, 0.2);
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: rgba(14, 165, 233, 0.2);
            bottom: -150px; right: -150px;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            z-index: 10;
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: block;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .auth-header p {
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .auth-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .auth-links a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.23);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* Error Message Styling */
        #errorMsg {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<div class="auth-container">
    <a href="index.html" class="auth-logo">RAPOS</a>
    
    <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Log in to access your portfolio insights.</p>
    </div>

    <div id="errorMsg">Invalid credentials. Please try again.</div>

    <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="auth-links">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-secondary);">
                <input type="checkbox" style="width: auto;"> Remember me
            </label>
            <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one here</a>
    </div>
</div>

<!-- Supabase SDK stack -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>

<script>
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const err = document.getElementById('errorMsg');
        
        btn.textContent = 'Authenticating...';
        btn.disabled = true;
        btn.style.opacity = '0.7';
        err.style.display = 'none';
        
        try {
            // Sign in with Supabase Auth
            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) throw error;

            if (data.user) {
                btn.style.background = '#10b981';
                btn.textContent = 'Success! Redirecting...';
                
                // Supabase handles session persistence automatically.
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            }
        } catch (error) {
            btn.textContent = 'Sign In';
            btn.disabled = false;
            btn.style.opacity = '1';
            err.textContent = "Error: " + error.message;
            err.style.display = 'block';
        }
    }
</script>
</body>
</html>
