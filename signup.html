<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RAPOS</title>
    <link rel="stylesheet" href="s1.css">
    <style>
        body {
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: rgba(37, 99, 235, 0.2);
            top: 0; left: 0;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: rgba(14, 165, 233, 0.15);
            bottom: 0; right: 0;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            z-index: 10;
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
            text-decoration: none;
            display: block;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .auth-header p {
            font-size: 15px;
            color: var(--text-secondary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.23);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }

        #errorMsg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            text-align: center;
            border: 1px solid #bbf7d0;
        }
        
        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<div class="auth-container">
    <a href="index.html" class="auth-logo">RAPOS</a>
    
    <div class="auth-header">
        <h1>Create an Account</h1>
        <p>Start optimizing your portfolio today.</p>
    </div>

    <div id="errorMsg">Account created successfully!</div>

    <form id="signupForm" onsubmit="event.preventDefault(); handleSignup();">
        <div class="form-row">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="John" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Doe" required>
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a strong password" required>
        </div>

        <div class="form-group">
            <label for="experience">Investment Experience</label>
            <select id="experience" required>
                <option value="" disabled selected>Select your level</option>
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced (Professional)</option>
            </select>
        </div>

        <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 20px;">
            By signing up, you agree to our <a href="#" style="color: var(--accent-primary);">Terms of Service</a> and <a href="#" style="color: var(--accent-primary);">Privacy Policy</a>.
        </div>

        <button type="submit" class="submit-btn" id="signupBtn">Create Account</button>
    </form>

    <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in here</a>
    </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>

<script>
    async function handleSignup() {
        const full_name = document.getElementById('firstName').value + " " + document.getElementById('lastName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const investment_exp = document.getElementById('experience').value;
        
        const btn = document.getElementById('signupBtn');
        const msg = document.getElementById('errorMsg');
        
        btn.textContent = 'Creating Account...';
        btn.disabled = true;
        btn.style.opacity = '0.7';
        msg.style.display = 'none';

        try {
            // Register user with Supabase Auth
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: full_name,
                        investment_exp: investment_exp
                    }
                }
            });

            if (error) throw error;

            // Success feedback
            btn.style.background = '#10b981';
            btn.textContent = 'Account Created!';
            msg.textContent = 'Success! Please check your email for a confirmation link (if enabled) or sign in now.';
            msg.style.display = 'block';
            msg.style.background = '#dcfce7';
            msg.style.color = '#166534';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2500);

        } catch (error) {
            btn.textContent = 'Create Account';
            btn.disabled = false;
            btn.style.opacity = '1';
            msg.textContent = "Error: " + error.message;
            msg.style.display = 'block';
            msg.style.background = '#fee2e2';
            msg.style.color = '#991b1b';
        }
    }
</script>
</body>
</html>
