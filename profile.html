<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile - RAPOS</title>
    <link rel="stylesheet" href="s1.css">
    <style>
        .profile-container {
            max-width: 500px;
            margin: 60px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            padding: 40px 30px;
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-header h2 {
            color: #1f3a5f;
            margin-bottom: 8px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #e3e9f6;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #2c5fb8;
            margin-bottom: 10px;
        }
        .profile-form label {
            font-weight: 600;
            color: #1f3a5f;
            margin-bottom: 6px;
            display: block;
        }
        .profile-form input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 6px;
            margin-bottom: 18px;
            font-size: 15px;
        }
        .profile-form input:focus {
            border-color: #2c5fb8;
            outline: none;
        }
        .profile-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .profile-actions button {
            padding: 10px 28px;
            border-radius: 6px;
            border: none;
            background: #2c5fb8;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .profile-actions button:hover {
            background: #1f3a5f;
        }
        .profile-message {
            text-align: center;
            margin-bottom: 15px;
            font-size: 15px;
        }
        .dark-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
<nav>
    <div class="logo">RAPOS</div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="profile.html" style="font-weight:600;color:#2c5fb8;">Profile</a></li>
        <li><a href="settings.html">Settings</a></li>
        <li><a href="login.html">Logout</a></li>
    </ul>
</nav>
<div class="profile-container">
    <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar">U</div>
        <h2 id="profileName">User Name</h2>
        <p id="profileEmail" style="color:#666;font-size:15px;">user@mail.com</p>
    </div>
    <form class="profile-form" id="profileForm">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <div class="dark-toggle">
            <input type="checkbox" id="darkModeToggle">
            <label for="darkModeToggle" style="margin:0;cursor:pointer;">Dark Mode</label>
        </div>
        <div class="profile-actions">
            <button type="submit">Save Changes</button>
            <button type="button" onclick="resetProfile()" style="background:#e0e0e0;color:#1f3a5f;">Reset</button>
        </div>
        <div class="profile-message" id="profileMessage"></div>
    </form>
</div>
<script src="modal.js"></script>
<script src="accessibility.js"></script>
<script src="responsive.js"></script>
<script>
    // Load profile data from localStorage (simulate user data)
    function loadProfile() {
        const name = localStorage.getItem('profileName') || 'Investor';
        const email = localStorage.getItem('profileEmail') || 'investor@mail.com';
        document.getElementById('name').value = name;
        document.getElementById('email').value = email;
        document.getElementById('profileName').textContent = name;
        document.getElementById('profileEmail').textContent = email;
        document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
        // Dark mode
        const dark = localStorage.getItem('darkMode') === 'true';
        document.getElementById('darkModeToggle').checked = dark;
        setDarkMode(dark);
    }
    function setDarkMode(enabled) {
        if (enabled) {
            document.body.style.background = '#181c24';
            document.body.style.color = '#f4f6f9';
            document.querySelector('.profile-container').style.background = '#232a36';
        } else {
            document.body.style.background = '';
            document.body.style.color = '';
            document.querySelector('.profile-container').style.background = '#fff';
        }
    }
    document.getElementById('darkModeToggle').addEventListener('change', function() {
        localStorage.setItem('darkMode', this.checked);
        setDarkMode(this.checked);
    });
    document.getElementById('profileForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        if (!name || !email) {
            showMessage('Please fill all fields.', false);
            return;
        }
        localStorage.setItem('profileName', name);
        localStorage.setItem('profileEmail', email);
        document.getElementById('profileName').textContent = name;
        document.getElementById('profileEmail').textContent = email;
        document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
        showMessage('Profile updated successfully!', true);
    });
    function resetProfile() {
        localStorage.removeItem('profileName');
        localStorage.removeItem('profileEmail');
        loadProfile();
        showMessage('Profile reset to default.', true);
    }
    function showMessage(msg, success) {
        const el = document.getElementById('profileMessage');
        el.textContent = msg;
        el.style.color = success ? '#2c5fb8' : '#d32f2f';
        setTimeout(() => { el.textContent = ''; }, 2500);
    }
    window.onload = loadProfile;
</script>
</body>
</html>
