<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - RAPOS</title>
    <link rel="stylesheet" href="s1.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1f3a5f, #2c5fb8);
            padding: 20px;
        }

        .reset-card {
            background: white;
            padding: 50px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .reset-title {
            font-size: 28px;
            color: #1f3a5f;
            margin: 0 0 10px 0;
        }

        .reset-subtitle {
            color: #888;
            font-size: 14px;
            margin: 0;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #1f3a5f;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: #2c5fb8;
            box-shadow: 0 0 8px rgba(44, 95, 184, 0.2);
            outline: none;
        }

        .reset-btn {
            background: linear-gradient(135deg, #1f3a5f, #2c5fb8);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(44, 95, 184, 0.3);
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #2c5fb8;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #1f3a5f;
            text-decoration: underline;
        }

        .message-box {
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-box.error {
            background: #fdecea;
            color: #b42318;
            border: 1px solid #f5c2c7;
            display: block;
        }

        .message-box.success {
            background: #e8f5e9;
            color: #1b5e20;
            border: 1px solid #a5d6a7;
            display: block;
        }

        .home-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            transform: translateX(-5px);
        }

        body {
            position: relative;
        }
    </style>
</head>

<body>

<a href="login.html" class="home-link">← Back to Login</a>
<nav>
    <div class="logo">RAPOS</div>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="signup.html">Sign Up</a></li>
        <li><a href="login.html" style="font-weight: 600; color: #2c5fb8;">Login</a></li>
    </ul>
</nav>

<div class="reset-container">
    <div class="reset-card">
        <div class="reset-header">
            <div class="reset-icon">S</div>
            <h1 class="reset-title">Reset Password</h1>
            <p class="reset-subtitle">Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <div id="messageBox" class="message-box" aria-live="polite"></div>

        <form onsubmit="handleReset(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Enter your registered email" 
                    required
                    autocomplete="email"
                >
            </div>

            <button type="submit" class="reset-btn">Send Reset Link</button>
        </form>

        <div class="back-link">
            <a href="login.html">Back to Login</a>
        </div>
    </div>
</div>

<script src="modal.js"></script>
<script src="accessibility.js"></script>
<script src="responsive.js"></script>
<script>
    function handleReset(event) {
        event.preventDefault();
        
        const messageBox = document.getElementById('messageBox');
        messageBox.textContent = '';
        messageBox.className = 'message-box';

        const email = document.getElementById('email').value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!emailRegex.test(email)) {
            messageBox.textContent = 'Please enter a valid email address.';
            messageBox.classList.add('error');
            return false;
        }

        // Simulate sending email
        messageBox.textContent = 'Password reset link has been sent to ' + email + '. Please check your inbox.';
        messageBox.classList.add('success');

        // Reset form
        document.querySelector('form').reset();

        // Redirect after 3 seconds
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 3000);
    }
</script>

</body>
</html>
